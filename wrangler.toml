name = "mailfree"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db"
database_id = "c82663ac-62b6-4ba6-be81-cbe297f2a3dd"

# 环境变量（已注释，避免 JSON 解析错误）
[vars]
# FORWARD_RULES='[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]'

# 静态资源目录
[assets]
directory = "public"
binding = "ASSETS"

# R2 存储桶绑定（已注释，绕过 R2 订阅限制）
# [[r2_buckets]]
# binding = "MAIL_EML"
# bucket_name = "mail-eml"

# 日志服务（可选）
# [observability.logs]
# enabled = true
