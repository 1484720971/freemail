name = "mailfree"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db"
database_id = "你的D1数据库ID"

# ✅ 关键：完全注释掉 vars 段，避免任何 JSON 解析
# [vars]
# FORWARD_RULES='[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]'

# 静态资源
[assets]
directory = "public"
binding = "ASSETS"

# ✅ 关键：完全注释掉 R2 绑定段
# [[r2_buckets]]
# binding = "MAIL_EML"
# bucket_name = "mail-eml"
